<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SipSip — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FFF8F0;
      --warm-orange: #F4845F;
      --soft-amber: #FFBE88;
      --deep-brown: #3B2314;
      --muted-tan: #C4956A;
      --light-tan: #F2DFC8;
      --white: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -100px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--soft-amber) 0%, transparent 70%);
      opacity: 0.5;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -140px; left: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, #F4845F 0%, transparent 70%);
      opacity: 0.3;
      border-radius: 50%;
      pointer-events: none;
    }

    .container {
      display: flex;
      width: 900px;
      max-width: 95vw;
      min-height: 560px;
      background: var(--white);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(59,35,20,0.15);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- LEFT PANEL ---- */
    .left-panel {
      flex: 1;
      background: linear-gradient(145deg, var(--warm-orange) 0%, var(--soft-amber) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 36px;
      position: relative;
      overflow: hidden;
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
    }
    .left-panel::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -50px;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
    }

    .hero-img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 50%;
      border: 6px solid rgba(255,255,255,0.5);
      box-shadow: 0 12px 40px rgba(59,35,20,0.2);
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    /* Fallback SVG illustration if no image */
    .hero-illustration {
      width: 180px;
      height: 180px;
      position: relative;
      z-index: 1;
      margin-bottom: 28px;
    }

    .left-panel h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: var(--white);
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 1.2;
    }
    .left-panel p {
      color: rgba(255,255,255,0.85);
      text-align: center;
      font-size: 0.95rem;
      margin-top: 10px;
      position: relative;
      z-index: 1;
      max-width: 220px;
      line-height: 1.6;
    }

    .tagline-badge {
      margin-top: 24px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 6px 18px;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      z-index: 1;
    }

    /* ---- RIGHT PANEL ---- */
    .right-panel {
      flex: 1;
      padding: 52px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: var(--deep-brown);
      margin-bottom: 6px;
    }

    .welcome-text {
      color: var(--muted-tan);
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--deep-brown);
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 2px solid var(--light-tan);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--deep-brown);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--warm-orange);
      box-shadow: 0 0 0 4px rgba(244,132,95,0.12);
      background: white;
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.83rem;
      color: var(--muted-tan);
      cursor: pointer;
    }
    .remember input { width: auto; padding: 0; margin: 0; accent-color: var(--warm-orange); }
    .forgot {
      font-size: 0.83rem;
      color: var(--warm-orange);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--warm-orange), var(--soft-amber));
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(244,132,95,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(244,132,95,0.45);
    }
    .btn-login:active { transform: translateY(0); }

    .btn-login .loader {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      text-align: center;
      color: var(--light-tan);
      font-size: 0.8rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%; height: 1px;
      background: var(--light-tan);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .register-row {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted-tan);
    }
    .register-row a {
      color: var(--warm-orange);
      font-weight: 700;
      text-decoration: none;
    }
    .register-row a:hover { text-decoration: underline; }

    .error-msg {
      background: #FDECEA;
      color: #c0392b;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 640px) {
      .left-panel { display: none; }
      .right-panel { padding: 40px 28px; }
      .container { border-radius: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- LEFT -->
  <div class="left-panel">
    <svg class="hero-illustration" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cup body -->
      <ellipse cx="90" cy="148" rx="42" ry="10" fill="rgba(255,255,255,0.25)"/>
      <path d="M55 75 L62 148 H118 L125 75 Z" fill="white" fill-opacity="0.95"/>
      <!-- Liquid -->
      <path d="M58 100 L62 148 H118 L122 100 Z" fill="#FFBE88" fill-opacity="0.8"/>
      <!-- Cup rim -->
      <rect x="50" y="70" width="80" height="10" rx="5" fill="white"/>
      <!-- Straw -->
      <rect x="96" y="28" width="8" height="80" rx="4" fill="#F4845F"/>
      <!-- Ice cubes -->
      <rect x="70" y="108" width="18" height="14" rx="4" fill="white" fill-opacity="0.6"/>
      <rect x="92" y="115" width="15" height="12" rx="4" fill="white" fill-opacity="0.5"/>
      <!-- Bubbles -->
      <circle cx="75" cy="90" r="4" fill="rgba(255,255,255,0.5)"/>
      <circle cx="95" cy="85" r="5.5" fill="rgba(255,255,255,0.4)"/>
      <circle cx="110" cy="92" r="3" fill="rgba(255,255,255,0.45)"/>
      <!-- Stars decorative -->
      <circle cx="32" cy="50" r="3" fill="white" fill-opacity="0.5"/>
      <circle cx="148" cy="60" r="4" fill="white" fill-opacity="0.4"/>
      <circle cx="145" cy="130" r="2.5" fill="white" fill-opacity="0.5"/>
      <circle cx="40" cy="130" r="3" fill="white" fill-opacity="0.4"/>
    </svg>

    <h1>SipSip<br/><em>Drinks</em></h1>
    <p>Minuman segar pilihan hati, diantar hangat ke pintu mu.</p>
    <div class="tagline-badge">☕ Order Now</div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="brand-name">Selamat datang 👋</div>
    <div class="welcome-text">Masuk untuk mulai memesan minuman favoritmu</div>

    <div class="error-msg" id="errorMsg">Username atau password salah.</div>

    <label for="username">Username</label>
    <div class="input-wrap">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#3B2314">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <input type="text" id="username" placeholder="Masukkan username kamu" autocomplete="username"/>
    </div>

    <label for="password">Password</label>
    <div class="input-wrap">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#3B2314">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
      <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password"/>
    </div>

    <div class="options-row">
      <label class="remember">
        <input type="checkbox" id="remember"/> Ingat saya
      </label>
      <a href="#" class="forgot">Lupa password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="btnText">Masuk Sekarang</span>
      <div class="loader" id="loader"></div>
    </button>

    <div class="divider">atau</div>
    <div class="register-row">Belum punya akun? <a href="#">Daftar di sini</a></div>
  </div>
</div>

<script>
  // ====== CONFIG: Ganti dengan URL MockAPI kamu ======
  const MOCKAPI_BASE = 'https://6a084e01fa9b27c848fad74a.mockapi.io';
  // Endpoint users, misal: /users
  // ===================================================

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const loader   = document.getElementById('loader');
    const btnText  = document.getElementById('btnText');

    errorMsg.style.display = 'none';
    if (!username || !password) {
      errorMsg.textContent = 'Username dan password tidak boleh kosong.';
      errorMsg.style.display = 'block';
      return;
    }

    // Show loader
    btnText.style.display = 'none';
    loader.style.display  = 'block';

    try {
      // MockAPI: cari user berdasarkan username
      const res  = await fetch(`${MOCKAPI_BASE}/users?username=${encodeURIComponent(username)}`);
      const data = await res.json();

      const user = data.find(u => u.username === username && u.password === password);

      if (user) {
        // Simpan sesi sederhana
        localStorage.setItem('sipsip_user', JSON.stringify({ id: user.id, username: user.username, name: user.name || user.username }));
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = 'Username atau password salah.';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      // Fallback: jika MockAPI belum diset, izinkan login demo
      console.warn('MockAPI tidak tersedia, mode demo aktif.');
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('sipsip_user', JSON.stringify({ id: 1, username: 'admin', name: 'Admin SipSip' }));
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = 'Mode demo: gunakan admin / admin123';
        errorMsg.style.display = 'block';
      }
    } finally {
      btnText.style.display = 'block';
      loader.style.display  = 'none';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // Redirect jika sudah login
  if (localStorage.getItem('sipsip_user')) {
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
